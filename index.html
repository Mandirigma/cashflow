<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c0c10">
<title>CashFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:       #0c0c10;
  --bg2:      #141418;
  --bg3:      #1c1c22;
  --bg4:      #242430;
  --border:   rgba(255,255,255,0.06);
  --border2:  rgba(255,255,255,0.1);
  --text:     #eceae4;
  --muted:    #6b6b80;
  --muted2:   #9494a8;
  --lime:     #c8f06e;
  --lime-dim: rgba(200,240,110,0.12);
  --blue:     #6eb4f0;
  --blue-dim: rgba(110,180,240,0.12);
  --red:      #f07070;
  --red-dim:  rgba(240,112,112,0.12);
  --amber:    #f0c06e;
  --amber-dim:rgba(240,192,110,0.12);
  --green:    #6ef0a0;
  --green-dim:rgba(110,240,160,0.1);
  --purple:   #b06ef0;
  --nav-h:    68px;
  --safe-b:   env(safe-area-inset-bottom,0px);
  --safe-t:   env(safe-area-inset-top,0px);
  --r-sm:     10px;
  --r-md:     16px;
  --r-lg:     22px;
  --r-xl:     28px;
}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;overflow:hidden;-webkit-font-smoothing:antialiased}

/* ── Shell ── */
#app{display:flex;flex-direction:column;height:100dvh}

.scroll-area{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:0 16px;
  padding-top:calc(var(--safe-t) + 12px);
  padding-bottom:calc(var(--nav-h) + var(--safe-b) + 20px);
  -webkit-overflow-scrolling:touch;
  scroll-behavior:smooth;
}
.scroll-area::-webkit-scrollbar{display:none}

/* ── Nav ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--nav-h) + var(--safe-b));
  padding-bottom:var(--safe-b);
  background:rgba(12,12,16,0.9);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:flex;align-items:flex-start;z-index:50;
}
.nav-item{
  flex:1;height:var(--nav-h);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:5px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:opacity 0.15s;
  position:relative;
}
.nav-pip{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  width:20px;height:2px;border-radius:2px;
  background:var(--lime);opacity:0;
  transition:opacity 0.2s;
}
.nav-item.active .nav-pip{opacity:1}
.nav-icon{font-size:20px;transition:transform 0.15s}
.nav-item.active .nav-icon{transform:scale(1.1)}
.nav-label{font-size:10px;font-weight:500;letter-spacing:0.05em;color:var(--muted);transition:color 0.15s}
.nav-item.active .nav-label{color:var(--lime)}

/* ── Views ── */
.view{display:none}.view.active{display:block}

/* ── Page header ── */
.page-hdr{
  display:flex;align-items:flex-end;justify-content:space-between;
  padding:8px 0 16px;
}
.page-title{
  font-family:'Syne',sans-serif;
  font-size:26px;font-weight:700;
  letter-spacing:-0.5px;line-height:1;
}
.page-sub{font-size:11px;color:var(--muted);letter-spacing:0.03em}

/* ── Chips ── */
.chip-row{
  display:flex;gap:6px;padding:0 0 12px;
  overflow-x:auto;scrollbar-width:none;
}
.chip-row::-webkit-scrollbar{display:none}
.chip{
  padding:7px 15px;border-radius:100px;
  border:1px solid var(--border2);
  font-size:12px;font-weight:500;
  color:var(--muted2);background:var(--bg2);
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
  transition:all 0.15s;
}
.chip.active{background:var(--lime);color:#0c0c10;border-color:var(--lime);font-weight:600}

/* ── Date range ── */
.date-range-row{display:flex;gap:8px;align-items:center;padding:0 0 12px}
.date-input{
  flex:1;background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--r-sm);padding:9px 12px;
  color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;
  -webkit-appearance:none;
}
.date-input:focus{border-color:var(--lime)}
.date-sep{color:var(--muted);font-size:13px;flex-shrink:0}

/* ── Hero card ── */
.hero{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--r-xl);
  padding:22px 20px 20px;
  margin-bottom:10px;
  position:relative;overflow:hidden;
}
.hero::after{
  content:'';position:absolute;top:-80px;right:-80px;
  width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,rgba(200,240,110,0.05) 0%,transparent 65%);
  pointer-events:none;
}
.hero-tag{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  color:rgba(200,240,110,0.55);margin-bottom:3px;
}
.hero-dates{font-size:12px;color:var(--muted);margin-bottom:18px}
.hero-label{font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.hero-net{
  font-family:'Syne',sans-serif;
  font-size:54px;font-weight:700;
  line-height:1;letter-spacing:-2px;
  margin-bottom:22px;
}
.hero-net.pos{color:var(--lime)}
.hero-net.neg{color:var(--red)}

/* Progress bars */
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.prog-lbl{font-size:11px;color:var(--muted);width:38px;flex-shrink:0}
.prog-track{flex:1;height:4px;background:rgba(255,255,255,0.07);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width 0.7s cubic-bezier(0.4,0,0.2,1)}
.prog-fill.lime{background:var(--lime)}
.prog-fill.blue{background:var(--blue)}
.prog-fill.amber{background:var(--amber)}
.prog-fill.red{background:var(--red)}
.prog-val{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted2);white-space:nowrap;min-width:60px;text-align:right}

/* Stat grid */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:18px}
.stat-box{background:rgba(255,255,255,0.03);border-radius:var(--r-md);padding:13px 14px}
.stat-lbl{font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:500}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:500;line-height:1}

/* ── Split cards ── */
.split-row{display:flex;gap:8px;margin-bottom:10px}
.split-card{
  flex:1;background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--r-lg);padding:15px;
}
.split-name{font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.split-amt{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:500;line-height:1}
.split-pct{font-size:11px;color:var(--muted);margin-top:4px}
.split-bar-track{margin-top:10px;height:3px;background:rgba(255,255,255,0.07);border-radius:4px;overflow:hidden}
.split-bar-fill{height:100%;border-radius:4px}

/* ── Section header ── */
.sec-hdr{
  display:flex;align-items:center;justify-content:space-between;
  font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--muted);padding:18px 0 8px;
}

/* ── Alert card ── */
.alert-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r-lg);overflow:hidden;margin-bottom:10px;
}
.alert-row{
  display:flex;align-items:center;
  padding:13px 16px;gap:12px;
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.alert-row:last-child{border-bottom:none}
.alert-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.alert-name{flex:1;font-size:13px}
.alert-pill{
  font-size:10px;font-weight:600;letter-spacing:0.06em;
  padding:3px 8px;border-radius:100px;
}

/* ── Transaction rows ── */
.txn-group{margin-bottom:2px}
.txn-date-lbl{
  font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--muted);padding:14px 0 7px;
  display:flex;justify-content:space-between;align-items:center;
}
.txn-date-total{font-family:'JetBrains Mono',monospace;font-size:11px}
.txn-row{
  display:flex;align-items:center;
  padding:11px 14px;
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--r-md);
  margin-bottom:6px;gap:12px;
}
.txn-icon{
  width:38px;height:38px;border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.txn-info{flex:1;min-width:0}
.txn-desc{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.txn-cat{font-size:11px;color:var(--muted);margin-top:2px}
.txn-right{text-align:right;flex-shrink:0}
.txn-amt{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:500}
.txn-person{font-size:11px;color:var(--muted);margin-top:2px}

/* ── Budget ── */
.budget-section-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 0 8px;
  font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);
  border-bottom:1px solid var(--border);
}
.budget-section-total{font-family:'JetBrains Mono',monospace;font-size:11px}
.budget-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r-lg);overflow:hidden;margin-bottom:10px;
}
.budget-row{
  display:flex;align-items:center;
  padding:13px 16px;gap:14px;
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.budget-row:last-child{border-bottom:none}
.budget-info{flex:1;min-width:0}
.budget-name{font-size:13px;margin-bottom:5px}
.budget-bar-track{height:3px;background:rgba(255,255,255,0.07);border-radius:4px;overflow:hidden}
.budget-bar-fill{height:100%;border-radius:4px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1)}
.budget-right{text-align:right;min-width:70px}
.budget-nums{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted2)}
.budget-pct{font-size:10px;color:var(--muted);margin-top:3px}
.budget-pill{font-size:10px;font-weight:600;letter-spacing:0.05em;padding:2px 8px;border-radius:100px;display:inline-block;margin-bottom:4px}

/* ── Summary mini cards ── */
.mini-cards{display:flex;gap:8px;margin-bottom:10px}
.mini-card{
  flex:1;background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r-md);padding:12px 14px;
}
.mini-lbl{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500}
.mini-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:500}

/* ── Loading / empty ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px;color:var(--muted);font-size:13px}
.spinner{width:24px;height:24px;border:1.5px solid var(--border2);border-top-color:var(--lime);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}

/* ── Fade in ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp 0.3s ease both}
.fu1{animation-delay:0.05s}.fu2{animation-delay:0.1s}.fu3{animation-delay:0.15s}
</style>
</head>
<body>
<div id="app">
  <div class="scroll-area" id="scroll-area">

    <!-- HOME -->
    <div class="view active" id="view-home">
      <div class="page-hdr">
        <div>
          <div class="page-title">Overview</div>
        </div>
        <div class="page-sub" id="as-of"></div>
      </div>
      <div class="chip-row">
        <div class="chip active" data-period="fortnight" onclick="setPeriod(this)">Fortnight</div>
        <div class="chip" data-period="today"     onclick="setPeriod(this)">Today</div>
        <div class="chip" data-period="week"      onclick="setPeriod(this)">This week</div>
        <div class="chip" data-period="lastweek"  onclick="setPeriod(this)">Last week</div>
        <div class="chip" data-period="month"     onclick="setPeriod(this)">This month</div>
        <div class="chip" data-period="custom"    onclick="setPeriod(this)">Custom</div>
      </div>
      <div class="date-range-row" id="custom-range" style="display:none">
        <input type="date" class="date-input" id="range-from" onchange="renderHome()">
        <div class="date-sep">→</div>
        <input type="date" class="date-input" id="range-to" onchange="renderHome()">
      </div>
      <div id="home-content"><div class="loading"><div class="spinner"></div>Loading…</div></div>
    </div>

    <!-- BUDGET -->
    <div class="view" id="view-budget">
      <div class="page-hdr">
        <div class="page-title">Budget</div>
        <div class="page-sub" id="budget-month"></div>
      </div>
      <div id="budget-content"><div class="loading"><div class="spinner"></div>Loading…</div></div>
    </div>

    <!-- TRANSACTIONS -->
    <div class="view" id="view-txn">
      <div class="page-hdr">
        <div class="page-title">Transactions</div>
      </div>
      <div class="chip-row" id="txn-filter">
        <div class="chip active" data-person="All"   onclick="filterTxn(this)">All</div>
        <div class="chip" data-person="X"            onclick="filterTxn(this)" id="chip-a">Tantan</div>
        <div class="chip" data-person="Y"            onclick="filterTxn(this)" id="chip-b">Martina</div>
        <div class="chip" data-person="Joint"        onclick="filterTxn(this)">Joint</div>
      </div>
      <div class="chip-row" id="period-filter">
        <div class="chip active" data-period="fortnight" onclick="filterPeriod(this)">Fortnight</div>
        <div class="chip" data-period="today"        onclick="filterPeriod(this)">Today</div>
        <div class="chip" data-period="yesterday"    onclick="filterPeriod(this)">Yesterday</div>
        <div class="chip" data-period="week"         onclick="filterPeriod(this)">This week</div>
        <div class="chip" data-period="lastweek"     onclick="filterPeriod(this)">Last week</div>
        <div class="chip" data-period="month"        onclick="filterPeriod(this)">This month</div>
        <div class="chip" data-period="lastmonth"    onclick="filterPeriod(this)">Last month</div>
        <div class="chip" data-period="custom"       onclick="filterPeriod(this)">Custom</div>
      </div>
      <div class="date-range-row" id="txn-custom-range" style="display:none">
        <input type="date" class="date-input" id="txn-range-from" onchange="renderTxn()">
        <div class="date-sep">→</div>
        <input type="date" class="date-input" id="txn-range-to" onchange="renderTxn()">
      </div>
      <div id="txn-content"><div class="loading"><div class="spinner"></div>Loading…</div></div>
    </div>

  </div>

  <nav class="bottom-nav">
    <div class="nav-item active" id="nav-home" onclick="switchView('home')">
      <div class="nav-pip"></div>
      <div class="nav-icon">📊</div>
      <div class="nav-label">Overview</div>
    </div>
    <div class="nav-item" id="nav-budget" onclick="switchView('budget')">
      <div class="nav-pip"></div>
      <div class="nav-icon">💰</div>
      <div class="nav-label">Budget</div>
    </div>
    <div class="nav-item" id="nav-txn" onclick="switchView('txn')">
      <div class="nav-pip"></div>
      <div class="nav-icon">📋</div>
      <div class="nav-label">Transactions</div>
    </div>
  </nav>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyoPeAB390dc2AvRuoSS2F6Zxol6ILMeOKK4kzwZ5KaC2uLxhFmByvNfnUBF1LQ2bPz/exec";

let data=null,curView="home",txnPerson="All",txnPeriod="fortnight",homePeriod="fortnight";

function jsonpFetch(url,cbName){
  return new Promise((resolve,reject)=>{
    const s=document.createElement("script");
    const t=setTimeout(()=>{cleanup();reject(new Error("Timeout"))},15000);
    function cleanup(){clearTimeout(t);delete window[cbName];if(s.parentNode)s.parentNode.removeChild(s)}
    window[cbName]=d=>{cleanup();resolve(d)};
    s.src=url+"&callback="+cbName;
    s.onerror=()=>{cleanup();reject(new Error("Script load failed"))};
    document.head.appendChild(s);
  });
}

(async function(){
  try{
    const json=await jsonpFetch(API_URL+"?action=dashboard","cfDash_"+Date.now());
    if(json.ok){data=json;renderAll();}
    else showError(json.error||"Unknown error");
  }catch(e){showError("Network error — check connection")}
})();

function showError(msg){
  document.getElementById("app").innerHTML=
    `<div style="padding:48px 24px;color:#f07070;font-family:sans-serif;font-size:14px;line-height:1.6">
      <div style="font-size:24px;margin-bottom:12px">⚠️</div>${msg}</div>`;
}

function switchView(v){
  curView=v;
  document.querySelectorAll(".view").forEach(el=>el.classList.remove("active"));
  document.querySelectorAll(".nav-item").forEach(el=>el.classList.remove("active"));
  document.getElementById("view-"+v).classList.add("active");
  document.getElementById("nav-"+v).classList.add("active");
  document.getElementById("scroll-area").scrollTop=0;
}

/* ── Format ── */
const fmt=n=>"$"+Math.abs(n).toLocaleString("en-AU",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtC=n=>{const a=Math.abs(n);return a>=1000?"$"+(a/1000).toFixed(1)+"k":"$"+a.toFixed(0)};

function typeColor(type){
  return type==="Income"?"var(--green)":type==="Fixed Expense"?"var(--blue)":type==="Variable Expense"?"var(--amber)":type==="Savings"?"var(--purple)":"var(--text)";
}
function typeBg(type){
  return type==="Income"?"var(--green-dim)":type==="Fixed Expense"?"var(--blue-dim)":type==="Variable Expense"?"var(--amber-dim)":type==="Savings"?"rgba(176,110,240,0.1)":"rgba(255,255,255,0.05)";
}
function typeIcon(type){
  return type==="Income"?"💵":type==="Fixed Expense"?"📋":type==="Variable Expense"?"🛍️":type==="Savings"?"🏦":"💸";
}

function renderAll(){
  if(!data)return;
  updatePersonChips();renderHome();renderBudget();renderTxn();
}
function updatePersonChips(){
  if(!data)return;
  ["a","b"].forEach((x,i)=>{
    const el=document.getElementById("chip-"+x);
    const name=[data.meta.nameA,data.meta.nameB][i];
    el.dataset.person=name;el.textContent=name;
  });
}

/* ── Period ── */
function setPeriod(el){
  document.querySelectorAll("#view-home .chip").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");homePeriod=el.dataset.period;
  const cr=document.getElementById("custom-range");
  if(homePeriod==="custom"){
    cr.style.display="flex";
    const today=new Date().toISOString().split("T")[0];
    const ms=today.slice(0,7)+"-01";
    if(!document.getElementById("range-from").value)document.getElementById("range-from").value=ms;
    if(!document.getElementById("range-to").value)document.getElementById("range-to").value=today;
  }else cr.style.display="none";
  renderHome();
}

function getPeriodWindow(){
  const now=new Date(),m=data.meta,freq=m.freq||14;
  if(homePeriod==="today"){
    const s=new Date(now);s.setHours(0,0,0,0);const e=new Date(now);e.setHours(23,59,59,999);
    return{start:s,end:e,label:"Today",sublabel:now.toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long"})};
  }
  if(homePeriod==="week"){
    const dow=now.getDay(),toMon=dow===0?6:dow-1;
    const s=new Date(now);s.setDate(s.getDate()-toMon);s.setHours(0,0,0,0);
    const e=new Date(s);e.setDate(e.getDate()+6);e.setHours(23,59,59,999);
    return{start:s,end:e,label:"This week",sublabel:s.toLocaleDateString("en-AU",{day:"numeric",month:"short"})+" – "+e.toLocaleDateString("en-AU",{day:"numeric",month:"short"})};
  }
  if(homePeriod==="lastweek"){
    const dow=now.getDay(),toMon=dow===0?6:dow-1;
    const thisM=new Date(now);thisM.setDate(thisM.getDate()-toMon);thisM.setHours(0,0,0,0);
    const s=new Date(thisM);s.setDate(s.getDate()-7);
    const e=new Date(thisM);e.setDate(e.getDate()-1);e.setHours(23,59,59,999);
    return{start:s,end:e,label:"Last week",sublabel:s.toLocaleDateString("en-AU",{day:"numeric",month:"short"})+" – "+e.toLocaleDateString("en-AU",{day:"numeric",month:"short"})};
  }
  if(homePeriod==="month"){
    const s=new Date(now.getFullYear(),now.getMonth(),1);
    const e=new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59,999);
    return{start:s,end:e,label:now.toLocaleDateString("en-AU",{month:"long",year:"numeric"}),sublabel:Math.ceil((now-s)/86400000)+" days in"};
  }
  if(homePeriod==="custom"){
    const fv=document.getElementById("range-from").value,tv=document.getElementById("range-to").value;
    if(!fv||!tv)return null;
    const s=new Date(fv);s.setHours(0,0,0,0);const e=new Date(tv);e.setHours(23,59,59,999);
    const days=Math.round((e-s)/86400000)+1;
    return{start:s,end:e,label:"Custom range",sublabel:days+" day"+(days!==1?"s":"")};
  }
  const fn=getFnWindow();
  return{start:fn.start,end:fn.end,label:"Fortnight",
    sublabel:fn.start.toLocaleDateString("en-AU",{day:"numeric",month:"short"})+" – "+fn.end.toLocaleDateString("en-AU",{day:"numeric",month:"short"}),
    daysLeft:fn.daysLeft,daysElapsed:fn.daysElapsed,freq:fn.freq,isFortnight:true};
}

function sumTxns(txns,start,end){
  let moneyIn=0,moneyOut=0,fixed=0,variable=0,savings=0,personA=0,personB=0;
  const na=data.meta.nameA,nb=data.meta.nameB;
  txns.forEach(t=>{
    const d=parseDateAU(t.date);
    if(d<start||d>end)return;
    if(t.type==="Income")moneyIn+=t.amount;
    else{moneyOut+=t.amount;if(t.type==="Fixed Expense")fixed+=t.amount;if(t.type==="Variable Expense")variable+=t.amount;if(t.type==="Savings")savings+=t.amount}
    if(t.person===na)personA+=t.amount;if(t.person===nb)personB+=t.amount;
  });
  return{moneyIn,moneyOut,net:moneyIn-moneyOut,fixed,variable,savings,personA,personB};
}

      </div>

    <div class="alert-card fu fu2">`;
    warnings.forEach(b=>{
      const isOver=b.status==="over";
      html+=`<div class="alert-row">
        <div class="alert-dot" style="background:${isOver?"var(--red)":"var(--amber)"}"></div>
        <div class="alert-name">${b.name}</div>

  const periodSpend=winTxns.filter(t=>t.type!=="Income").reduce((s,t)=>s+t.amount,0);

    Object.keys(grouped).sort((a,b)=>parseDateAU(b)-parseDateAU(a)).forEach(date=>{

      if(homePeriod!=="today")html+=`<div class="txn-date-lbl"><span>${lbl}</span>${dayTotal>0?`<span class="txn-date-total" style="color:var(--muted)">${fmt(dayTotal)}</span>`:""}</div>`;
      grouped[date].forEach(t=>{

          <div class="txn-right">
            <div class="txn-amt" style="color:${amtCol}">${t.type==="Income"?"+":""}${fmt(t.amount)}</div>

/* ── BUDGET ── */

  const sections=["Fixed Expense","Variable Expense","Savings"];
  const labels={"Fixed Expense":"Fixed expenses","Variable Expense":"Variable expenses","Savings":"Savings & loans"};

  let html="";
  sections.forEach((type,si)=>{
    const rows=data.budget.filter(b=>b.type===type);
    if(!rows.length)return;
    const total=rows.reduce((s,b)=>s+b.spent,0);

      <span>${labels[type]}</span>
      <span class="budget-section-total" style="color:var(--muted2)">${fmt(total)} / ${fmt(budgetTotal)}</span>
    </div>
    <div class="budget-card">`;
    rows.forEach(b=>{

                    :b.budget>0?`<div class="budget-pill" style="background:var(--green-dim);color:var(--green)">OK</div>`:``;
      html+=`<div class="budget-row">
        <div class="budget-info">
          <div class="budget-name">${b.name}</div>
          <div class="budget-bar-track">
            <div class="budget-bar-fill" style="width:${(pct*100).toFixed(1)}%;background:${barColor}"></div>
          </div>
        </div>
        <div class="budget-right">
          ${pillHtml}
          <div class="budget-nums">${fmt(b.spent)}</div>
          <div class="budget-pct">${b.budget>0?"of "+fmt(b.budget):"no target"}</div>

  });
  document.getElementById("budget-content").innerHTML=html||`<div class="empty">No budget data</div>`;
}

/* ── Date utils ── */
function formatDateAU(d){
  return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear();
}
function parseDateAU(str){
  const p=str.split("/");
  return p.length===3?new Date(+p[2],+p[1]-1,+p[0]):new Date(str);
}
function startOfDay(d){const r=new Date(d);r.setHours(0,0,0,0);return r}
function endOfDay(d){const r=new Date(d);r.setHours(23,59,59,999);return r}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}

function getFnWindow(){
  const m=data.meta,freq=m.freq||14,now=new Date();
  const MONTHS={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  function parseMetaDate(str){try{const[dd,mo]=str.split(" ");return new Date(now.getFullYear(),MONTHS[mo],parseInt(dd))}catch(e){return new Date()}}
  const s=startOfDay(parseMetaDate(m.fnStart));
  const e=endOfDay(parseMetaDate(m.fnEnd));
  if(e<s)e.setFullYear(e.getFullYear()+1);
  const daysLeft=Math.max(0,Math.ceil((e-now)/86400000));
  const daysElapsed=Math.max(0,freq-daysLeft);
  return{start:s,end:e,daysLeft,daysElapsed,freq};
}

/* ── TRANSACTIONS ── */
function filterTxn(el){
  document.querySelectorAll("#txn-filter .chip").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");txnPerson=el.dataset.person;renderTxn();
}
function filterPeriod(el){
  document.querySelectorAll("#period-filter .chip").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");txnPeriod=el.dataset.period;
  const cr=document.getElementById("txn-custom-range");
  if(txnPeriod==="custom"){
    cr.style.display="flex";
    const today=new Date().toISOString().split("T")[0];
    if(!document.getElementById("txn-range-from").value)document.getElementById("txn-range-from").value=today;
    if(!document.getElementById("txn-range-to").value)document.getElementById("txn-range-to").value=today;
  }else cr.style.display="none";
  renderTxn();
}
function getTxnWindow(){
  const now=new Date();
  if(txnPeriod==="today")return{start:startOfDay(now),end:endOfDay(now)};
  if(txnPeriod==="yesterday"){const y=addDays(now,-1);return{start:startOfDay(y),end:endOfDay(y)}}
  if(txnPeriod==="week"){const dow=now.getDay(),toMon=dow===0?6:dow-1,mon=addDays(now,-toMon);return{start:startOfDay(mon),end:endOfDay(addDays(mon,6))}}
  if(txnPeriod==="lastweek"){const dow=now.getDay(),toMon=dow===0?6:dow-1,thisM=addDays(now,-toMon),lastM=addDays(thisM,-7);return{start:startOfDay(lastM),end:endOfDay(addDays(lastM,6))}}
  if(txnPeriod==="month")return{start:new Date(now.getFullYear(),now.getMonth(),1),end:endOfDay(now)};
  if(txnPeriod==="lastmonth"){const y=now.getMonth()===0?now.getFullYear()-1:now.getFullYear(),m=now.getMonth()===0?11:now.getMonth()-1;return{start:new Date(y,m,1),end:new Date(y,m+1,0,23,59,59,999)}}
  if(txnPeriod==="custom"){const f=document.getElementById("txn-range-from").value,t=document.getElementById("txn-range-to").value;if(!f||!t)return null;return{start:startOfDay(new Date(f)),end:endOfDay(new Date(t))}}
  const fn=getFnWindow();return{start:fn.start,end:fn.end};
}

function renderTxn(){
  if(!data)return;
  updatePersonChips();
  const win=getTxnWindow();
  if(!win){document.getElementById("txn-content").innerHTML=`<div class="empty">Select a date range above</div>`;return}
  let txns=data.transactions.filter(t=>{const d=parseDateAU(t.date);return d>=win.start&&d<=win.end});
  if(txnPerson!=="All")txns=txns.filter(t=>t.person===txnPerson);
  if(txns.length===0){document.getElementById("txn-content").innerHTML=`<div class="empty">No transactions for this filter</div>`;return}

  const totalOut=txns.filter(t=>t.type!=="Income").reduce((s,t)=>s+t.amount,0);
  const totalIn=txns.filter(t=>t.type==="Income").reduce((s,t)=>s+t.amount,0);

  let html=`<div class="mini-cards">
    <div class="mini-card"><div class="mini-lbl">Total spent</div><div class="mini-val" style="color:var(--red)">${fmt(totalOut)}</div></div>
    <div class="mini-card"><div class="mini-lbl">Total in</div><div class="mini-val" style="color:var(--green)">${fmt(totalIn)}</div></div>
  </div>`;

  const groups={};
  txns.forEach(t=>{if(!groups[t.date])groups[t.date]=[];groups[t.date].push(t)});
  const todayS=formatDateAU(new Date()),yestS=formatDateAU(addDays(new Date(),-1));

  Object.keys(groups).sort((a,b)=>parseDateAU(b)-parseDateAU(a)).forEach(date=>{
    const lbl=date===todayS?"Today":date===yestS?"Yesterday":parseDateAU(date).toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"});
    const dayOut=groups[date].filter(t=>t.type!=="Income").reduce((s,t)=>s+t.amount,0);
    html+=`<div class="txn-group">
      <div class="txn-date-lbl"><span>${lbl}</span>${dayOut>0?`<span class="txn-date-total" style="color:var(--muted)">${fmt(dayOut)}</span>`:""}</div>`;
    groups[date].forEach(t=>{
      const col=typeColor(t.type),bg=typeBg(t.type),icon=typeIcon(t.type);
      const amtCol=t.type==="Income"?"var(--green)":"var(--text)";
      html+=`<div class="txn-row">
        <div class="txn-icon" style="background:${bg}">${icon}</div>
        <div class="txn-info"><div class="txn-desc">${t.desc}</div><div class="txn-cat">${t.category||t.type}</div></div>
        <div class="txn-right">
          <div class="txn-amt" style="color:${amtCol}">${t.type==="Income"?"+":""}${fmt(t.amount)}</div>
          <div class="txn-person">${t.person}</div>
        </div>
      </div>`;
    });
    html+=`</div>`;
  });
  document.getElementById("txn-content").innerHTML=html;
}
