<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>Cash Flow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Reset & base ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0a0a0f;
  --bg2:      #13131a;
  --bg3:      #1c1c27;
  --border:   rgba(255,255,255,0.07);
  --text:     #f0eee8;
  --muted:    #7a7a8a;
  --accent:   #c8f06e;
  --accent2:  #6e9ef0;
  --red:      #f06e6e;
  --amber:    #f0c46e;
  --green:    #6ef0a0;
  --nav-h:    72px;
  --safe-b:   env(safe-area-inset-bottom, 0px);
  --safe-t:   env(safe-area-inset-top, 0px);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}


/* ── App shell ────────────────────────────────────────────────────────────── */
#app {
  display: flex; flex-direction: column;
  height: 100%; height: 100dvh;
}
#app.ready { display: flex; }

/* ── Scroll area ──────────────────────────────────────────────────────────── */
.scroll-area {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 0 16px;
  padding-top: calc(var(--safe-t) + 16px);
  padding-bottom: calc(var(--nav-h) + var(--safe-b) + 16px);
  -webkit-overflow-scrolling: touch;
}

/* ── Bottom nav ───────────────────────────────────────────────────────────── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--nav-h) + var(--safe-b));
  padding-bottom: var(--safe-b);
  background: rgba(13,13,18,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex; align-items: flex-start;
  z-index: 50;
}
.nav-item {
  flex: 1; height: var(--nav-h);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: opacity 0.15s;
}
.nav-icon { font-size: 22px; }
.nav-label {
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.04em; color: var(--muted);
  transition: color 0.15s;
}
.nav-item.active .nav-label { color: var(--accent); }
.nav-item.active .nav-icon  { filter: drop-shadow(0 0 8px var(--accent)); }

/* ── Views ────────────────────────────────────────────────────────────────── */
.view { display: none; }
.view.active { display: block; }

/* ── Section headings ─────────────────────────────────────────────────────── */
.section-label {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted); margin: 24px 0 10px;
}

/* ── Card ─────────────────────────────────────────────────────────────────── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 12px;
}
.card-sm { padding: 14px 18px; border-radius: 16px; }

/* ── HOME — fortnightly hero ──────────────────────────────────────────────── */
.fn-hero {
  background: linear-gradient(135deg, #1a2a12 0%, #0f1a1e 100%);
  border: 1px solid rgba(200,240,110,0.2);
  border-radius: 24px;
  padding: 24px 20px 20px;
  margin-bottom: 12px;
  position: relative; overflow: hidden;
}
.fn-hero::before {
  content: '';
  position: absolute; top: -60px; right: -60px;
  width: 180px; height: 180px; border-radius: 50%;
  background: radial-gradient(circle, rgba(200,240,110,0.08) 0%, transparent 70%);
}
.fn-period {
  font-size: 12px; color: rgba(200,240,110,0.6);
  letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 4px;
}
.fn-dates {
  font-size: 13px; color: var(--muted); margin-bottom: 20px;
}
.fn-net-label {
  font-size: 12px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 4px;
}
.fn-net {
  font-family: 'Fraunces', serif;
  font-size: 52px; font-weight: 600;
  line-height: 1; letter-spacing: -2px;
  margin-bottom: 20px;
}
.fn-net.positive { color: var(--accent); }
.fn-net.negative { color: var(--red); }

.fn-progress-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
}
.fn-progress-label { font-size: 12px; color: var(--muted); white-space: nowrap; }
.fn-progress-bar {
  flex: 1; height: 4px; background: rgba(255,255,255,0.08);
  border-radius: 2px; overflow: hidden;
}
.fn-progress-fill {
  height: 100%; border-radius: 2px;
  background: var(--accent);
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
}
.fn-progress-fill.warning { background: var(--amber); }
.fn-progress-fill.danger  { background: var(--red); }
.fn-progress-days {
  font-size: 12px; color: var(--muted); white-space: nowrap;
  font-family: 'DM Mono', monospace;
}

.fn-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin-top: 16px;
}
.fn-stat {
  background: rgba(255,255,255,0.04);
  border-radius: 12px; padding: 12px;
}
.fn-stat-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.fn-stat-value {
  font-family: 'DM Mono', monospace;
  font-size: 17px; font-weight: 500;
}
.fn-stat-value.in  { color: var(--green); }
.fn-stat-value.out { color: var(--red); }
.fn-stat-value.a   { color: var(--accent2); }
.fn-stat-value.b   { color: var(--amber); }

/* ── People split ─────────────────────────────────────────────────────────── */
.split-row {
  display: flex; gap: 8px;
}
.split-card {
  flex: 1; background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px; padding: 16px;
}
.split-name { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.split-amt {
  font-family: 'DM Mono', monospace;
  font-size: 22px; font-weight: 500;
}
.split-pct { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* ── Today strip ──────────────────────────────────────────────────────────── */
.today-row {
  display: flex; align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}
.today-row:last-child { border-bottom: none; }
.today-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
}
.today-desc { flex: 1; font-size: 14px; line-height: 1.3; }
.today-cat  { font-size: 11px; color: var(--muted); margin-top: 1px; }
.today-right { text-align: right; }
.today-amt {
  font-family: 'DM Mono', monospace;
  font-size: 15px; font-weight: 500;
}
.today-person { font-size: 11px; color: var(--muted); margin-top: 1px; }

/* ── Budget view ──────────────────────────────────────────────────────────── */
.budget-section-hdr {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 0 8px;
  font-size: 12px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}
.budget-row {
  display: flex; align-items: center;
  padding: 12px 0; gap: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.budget-row:last-child { border-bottom: none; }
.budget-name { flex: 1; font-size: 13px; line-height: 1.3; }
.budget-right { text-align: right; min-width: 80px; }
.budget-nums {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
}
.budget-bar-wrap {
  width: 100%; height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px; overflow: hidden;
  margin-top: 4px;
}
.budget-bar-fill {
  height: 100%; border-radius: 2px;
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
}
.status-ok   .budget-bar-fill { background: var(--green); }
.status-near .budget-bar-fill { background: var(--amber); }
.status-over .budget-bar-fill { background: var(--red); }
.budget-pill {
  font-size: 10px; font-weight: 600; letter-spacing: 0.06em;
  padding: 2px 7px; border-radius: 6px; white-space: nowrap;
}
.pill-ok   { background: rgba(110,240,160,0.12); color: var(--green); }
.pill-near { background: rgba(240,196,110,0.15); color: var(--amber); }
.pill-over { background: rgba(240,110,110,0.15); color: var(--red); }

/* ── Transactions view ────────────────────────────────────────────────────── */
.txn-filter {
  display: flex; gap: 8px; padding: 16px 0 8px;
  overflow-x: auto; scrollbar-width: none;
}
.txn-filter::-webkit-scrollbar { display: none; }
.filter-chip {
  padding: 6px 16px; border-radius: 20px;
  border: 1px solid var(--border);
  font-size: 13px; font-weight: 500;
  color: var(--muted); background: var(--bg2);
  cursor: pointer; white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.15s;
}
.filter-chip.active {
  background: var(--accent); color: var(--bg);
  border-color: var(--accent);
}

.txn-date-group { margin-bottom: 4px; }
.txn-date-label {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); padding: 14px 0 6px;
}
.txn-row {
  display: flex; align-items: center;
  padding: 11px 14px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px; margin-bottom: 6px;
  gap: 12px;
}
.txn-icon {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.txn-info { flex: 1; min-width: 0; }
.txn-desc {
  font-size: 14px; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.txn-cat { font-size: 11px; color: var(--muted); margin-top: 1px; }
.txn-right { text-align: right; flex-shrink: 0; }
.txn-amt {
  font-family: 'DM Mono', monospace;
  font-size: 15px; font-weight: 500;
}
.txn-person {
  font-size: 11px; color: var(--muted);
  margin-top: 1px;
}

/* ── Loading / empty states ───────────────────────────────────────────────── */
.loading {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 60px 20px; gap: 16px;
  color: var(--muted); font-size: 14px;
}
.spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty {
  text-align: center; padding: 48px 20px;
  color: var(--muted); font-size: 14px;
}

/* ── Header ───────────────────────────────────────────────────────────────── */
.view-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0 4px;
}
.view-title {
  font-family: 'Fraunces', serif;
  font-size: 28px; font-weight: 300;
  letter-spacing: -0.5px;
}
.as-of { font-size: 11px; color: var(--muted); }

/* ── Utility ──────────────────────────────────────────────────────────────── */
.mono { font-family: 'DM Mono', monospace; }
.red  { color: var(--red); }
.grn  { color: var(--green); }
.amt  { font-family: 'DM Mono', monospace; }

/* ── Period selector ──────────────────────────────────────────────────────── */
.period-bar {
  display: flex; gap: 6px; padding: 12px 0 4px;
  overflow-x: auto; scrollbar-width: none;
}
.period-bar::-webkit-scrollbar { display: none; }
.period-chip {
  padding: 7px 14px; border-radius: 20px;
  border: 1px solid var(--border);
  font-size: 13px; font-weight: 500;
  color: var(--muted); background: var(--bg2);
  cursor: pointer; white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.15s; flex-shrink: 0;
}
.period-chip.active {
  background: var(--accent); color: var(--bg);
  border-color: var(--accent);
}

/* ── Date range picker ────────────────────────────────────────────────────── */
.date-range-row {
  display: flex; gap: 8px; align-items: center;
  padding: 8px 0 4px;
}
.date-input {
  flex: 1; background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 14px;
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 14px; outline: none;
  -webkit-appearance: none;
}
.date-input:focus { border-color: var(--accent); }
.date-sep { color: var(--muted); font-size: 13px; flex-shrink: 0; }

/* ── Fade-in animation ────────────────────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fadeUp 0.35s ease both; }
</style>
</head>
<body>

<!-- ── App ────────────────────────────────────────────────────────────────── -->
<div id="app">
  <div class="scroll-area" id="scroll-area">

    <!-- HOME -->
    <div class="view active" id="view-home">
      <div class="view-header">
        <div class="view-title">Overview</div>
        <div class="as-of" id="as-of"></div>
      </div>
      <!-- Period selector -->
      <div class="period-bar">
        <div class="period-chip active" data-period="fortnight" onclick="setPeriod(this)">Fortnight</div>
        <div class="period-chip" data-period="today"     onclick="setPeriod(this)">Today</div>
        <div class="period-chip" data-period="week"      onclick="setPeriod(this)">This week</div>
        <div class="period-chip" data-period="lastweek"  onclick="setPeriod(this)">Last week</div>
        <div class="period-chip" data-period="month"     onclick="setPeriod(this)">This month</div>
        <div class="period-chip" data-period="custom"    onclick="setPeriod(this)">Custom</div>
      </div>
      <div class="date-range-row" id="custom-range" style="display:none">
        <input type="date" class="date-input" id="range-from" onchange="renderHome()">
        <div class="date-sep">→</div>
        <input type="date" class="date-input" id="range-to" onchange="renderHome()">
      </div>
      <div id="home-content"><div class="loading"><div class="spinner"></div>Loading…</div></div>
    </div>

    <!-- BUDGET -->
    <div class="view" id="view-budget">
      <div class="view-header">
        <div class="view-title">Budget</div>
        <div class="as-of" id="budget-month"></div>
      </div>
      <div id="budget-content"><div class="loading"><div class="spinner"></div>Loading…</div></div>
    </div>

    <!-- TRANSACTIONS -->
    <div class="view" id="view-txn">
      <div class="view-header">
        <div class="view-title">Transactions</div>
      </div>
      <!-- Person filter -->
      <div class="txn-filter" id="txn-filter">
        <div class="filter-chip active" data-person="All" onclick="filterTxn(this)">All</div>
        <div class="filter-chip" data-person="X" onclick="filterTxn(this)" id="chip-a">Tantan</div>
        <div class="filter-chip" data-person="Y" onclick="filterTxn(this)" id="chip-b">Martina</div>
        <div class="filter-chip" data-person="Joint" onclick="filterTxn(this)">Joint</div>
      </div>
      <!-- Period filter -->
      <div class="txn-filter" id="period-filter">
        <div class="filter-chip active" data-period="fortnight" onclick="filterPeriod(this)">Fortnight</div>
        <div class="filter-chip" data-period="today"    onclick="filterPeriod(this)">Today</div>
        <div class="filter-chip" data-period="yesterday" onclick="filterPeriod(this)">Yesterday</div>
        <div class="filter-chip" data-period="week"    onclick="filterPeriod(this)">This week</div>
        <div class="filter-chip" data-period="lastweek" onclick="filterPeriod(this)">Last week</div>
        <div class="filter-chip" data-period="month"   onclick="filterPeriod(this)">This month</div>
        <div class="filter-chip" data-period="lastmonth" onclick="filterPeriod(this)">Last month</div>
        <div class="filter-chip" data-period="custom"  onclick="filterPeriod(this)">Custom</div>
      </div>
      <!-- Custom date range (hidden unless custom selected) -->
      <div class="date-range-row" id="txn-custom-range" style="display:none">
        <input type="date" class="date-input" id="txn-range-from" onchange="renderTxn()">
        <div class="date-sep">→</div>
        <input type="date" class="date-input" id="txn-range-to" onchange="renderTxn()">
      </div>
      <div id="txn-content"><div class="loading"><div class="spinner"></div>Loading…</div></div>
    </div>

  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <div class="nav-item active" id="nav-home" onclick="switchView('home')">
      <div class="nav-icon">📊</div>
      <div class="nav-label">Overview</div>
    </div>
    <div class="nav-item" id="nav-budget" onclick="switchView('budget')">
      <div class="nav-icon">💰</div>
      <div class="nav-label">Budget</div>
    </div>
    <div class="nav-item" id="nav-txn" onclick="switchView('txn')">
      <div class="nav-icon">📆</div>
      <div class="nav-label">Transactions</div>
    </div>
  </nav>
</div>

<script>
// ── Config — replace with your actual Web App URL ─────────────────────────────
const API_URL = "https://script.google.com/macros/s/AKfycbyoPeAB390dc2AvRuoSS2F6Zxol6ILMeOKK4kzwZ5KaC2uLxhFmByvNfnUBF1LQ2bPz/exec";

// ── State ─────────────────────────────────────────────────────────────────────
let pinEntry   = "";
let data       = null;
let curView    = "home";
let txnPerson  = "All";
let txnPeriod  = "fortnight";
let homePeriod = "fortnight";

// ── PIN ───────────────────────────────────────────────────────────────────────
function pinTap(digit) {
  if (!digit || pinEntry.length >= 4) return;
  pinEntry += digit;
  updateDots();
  if (pinEntry.length === 4) submitPin();
}
function pinDel() {
  pinEntry = pinEntry.slice(0, -1);
  updateDots();
  document.getElementById("pin-error").textContent = "";
  document.querySelectorAll(".pin-dot").forEach(d => d.classList.remove("error"));
}
function updateDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById("d" + i).classList.toggle("filled", i < pinEntry.length);
  }
}
function jsonpFetch(url, callbackName) {
  return new Promise((resolve, reject) => {
    const script = document.createElement("script");
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error("Timeout"));
    }, 15000);
    function cleanup() {
      clearTimeout(timeout);
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    window[callbackName] = function(responseData) {
      cleanup();
      resolve(responseData);
    };
    script.src = url + "&callback=" + callbackName;
    script.onerror = () => { cleanup(); reject(new Error("Script load failed")); };
    document.head.appendChild(script);
  });
}

async function submitPin() {
  const pin = pinEntry;
  try {
    const json = await jsonpFetch(
      API_URL + "?action=dashboard&pin=" + pin,
      "cfDashCallback_" + Date.now()
    );
    if (json.ok) {
      data = json;
      localStorage.setItem("cf_pin", pin);
      document.getElementById("app").classList.add("ready");
      renderAll();
    } else {
      showPinError(json.error === "Invalid PIN" ? "Incorrect PIN" : (json.error || "Incorrect PIN"));
    }
  } catch(e) {
    showPinError("Network error — check connection");
  }
}
function showPinError(msg) {
  document.querySelectorAll(".pin-dot").forEach(d => {
    d.classList.remove("filled"); d.classList.add("error");
  });
  document.getElementById("pin-error").textContent = msg || "Incorrect PIN";
  setTimeout(() => {
    pinEntry = "";
    document.querySelectorAll(".pin-dot").forEach(d => {
      d.classList.remove("error");
    });
    updateDots();
  }, 900);
}

// ── Load dashboard directly — no PIN ─────────────────────────────────────────
(async function() {
  try {
    const json = await jsonpFetch(
      API_URL + "?action=dashboard",
      "cfDashCallback_" + Date.now()
    );
    if (json.ok) {
      data = json;
      document.getElementById("app").classList.add("ready");
      renderAll();
    } else {
      document.getElementById("app").innerHTML =
        '<div style="padding:40px;color:#f06e6e;font-family:sans-serif">Error: ' + (json.error||"Unknown") + '</div>';
      document.getElementById("app").classList.add("ready");
    }
  } catch(e) {
    document.getElementById("app").innerHTML =
      '<div style="padding:40px;color:#f06e6e;font-family:sans-serif">Network error — check connection</div>';
    document.getElementById("app").classList.add("ready");
  }
})();

// ── Navigation ────────────────────────────────────────────────────────────────
function switchView(v) {
  curView = v;
  document.querySelectorAll(".view").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
  document.getElementById("view-" + v).classList.add("active");
  document.getElementById("nav-"  + v).classList.add("active");
  document.getElementById("scroll-area").scrollTop = 0;
}

// ── Format helpers ────────────────────────────────────────────────────────────
const fmt = n => "$" + Math.abs(n).toLocaleString("en-AU", {minimumFractionDigits:2, maximumFractionDigits:2});
const fmtCompact = n => {
  const abs = Math.abs(n);
  if (abs >= 1000) return "$" + (abs/1000).toFixed(1) + "k";
  return "$" + abs.toFixed(0);
};

function typeIcon(type) {
  const icons = {
    "Income": "💵", "Fixed Expense": "📋",
    "Variable Expense": "🛒", "Savings": "🏦", "": "💸"
  };
  return icons[type] || "💸";
}
function typeColor(type) {
  return type === "Income" ? "#6ef0a0"
       : type === "Fixed Expense" ? "#6e9ef0"
       : type === "Variable Expense" ? "#f0c46e"

function setPeriod(el) {

function getPeriodWindow() {
  const now   = new Date();
  const m     = data.meta;
  const freq  = m.freq || 14;

  if (homePeriod === "today") {
    const s = new Date(now); s.setHours(0,0,0,0);
    const e = new Date(now); e.setHours(23,59,59,999);
    return { start: s, end: e, label: "Today", sublabel: now.toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long"}) };
  }
  if (homePeriod === "week") {
    const dow   = now.getDay();
    const toMon = dow === 0 ? 6 : dow - 1;
    const s = new Date(now); s.setDate(s.getDate() - toMon); s.setHours(0,0,0,0);
    const e = new Date(s);   e.setDate(e.getDate() + 6);     e.setHours(23,59,59,999);
    return { start: s, end: e,
      label: "This week",
      sublabel: s.toLocaleDateString("en-AU",{day:"numeric",month:"short"}) + " – " + e.toLocaleDateString("en-AU",{day:"numeric",month:"short"}) };
  }
  if (homePeriod === "lastweek") {
    const dow   = now.getDay();
    const toMon = dow === 0 ? 6 : dow - 1;
    const thisM = new Date(now); thisM.setDate(thisM.getDate() - toMon); thisM.setHours(0,0,0,0);
    const s = new Date(thisM); s.setDate(s.getDate() - 7);
    const e = new Date(thisM); e.setDate(e.getDate() - 1); e.setHours(23,59,59,999);
    return { start: s, end: e,
      label: "Last week",
      sublabel: s.toLocaleDateString("en-AU",{day:"numeric",month:"short"}) + " – " + e.toLocaleDateString("en-AU",{day:"numeric",month:"short"}) };
  }
  if (homePeriod === "month") {
    const s = new Date(now.getFullYear(), now.getMonth(), 1);
    const e = new Date(now.getFullYear(), now.getMonth()+1, 0, 23, 59, 59, 999);
    return { start: s, end: e,
      label: now.toLocaleDateString("en-AU",{month:"long", year:"numeric"}),
      sublabel: Math.ceil((now - s) / 86400000) + " days in" };
  }
  if (homePeriod === "custom") {
    const fromVal = document.getElementById("range-from").value;
    const toVal   = document.getElementById("range-to").value;
    if (!fromVal || !toVal) return null;
    const s = new Date(fromVal); s.setHours(0,0,0,0);
    const e = new Date(toVal);   e.setHours(23,59,59,999);
    const days = Math.round((e - s) / 86400000) + 1;
    return { start: s, end: e,
      label: "Custom range",
      sublabel: days + " day" + (days !== 1 ? "s" : "") };
  }
  // Default: fortnight — use shared getFnWindow()
  const fn = getFnWindow();
  const daysLeft    = fn.daysLeft;
  const daysElapsed = fn.daysElapsed;
  return { start: fn.start, end: fn.end,
    label: "Fortnight",
    sublabel: fn.start.toLocaleDateString("en-AU",{day:"numeric",month:"short"}) + " – " + fn.end.toLocaleDateString("en-AU",{day:"numeric",month:"short"}),
    daysLeft, daysElapsed, freq: fn.freq, isFortnight: true };
}

function sumTransactions(txns, start, end) {
  let moneyIn=0, moneyOut=0, fixed=0, variable=0, savings=0, personA=0, personB=0;
  const nameA = data.meta.nameA, nameB = data.meta.nameB;
  txns.forEach(t => {
    const d = parseDateAU(t.date);
    if (d < start || d > end) return;
    const amt = t.amount;
    if (t.type === "Income") { moneyIn += amt; }
    else {
      moneyOut += amt;
      if (t.type === "Fixed Expense")    fixed    += amt;
      if (t.type === "Variable Expense") variable += amt;
      if (t.type === "Savings")          savings  += amt;
    }
    if (t.person === nameA) personA += amt;
    if (t.person === nameB) personB += amt;
  });
  return { moneyIn, moneyOut, net: moneyIn-moneyOut, fixed, variable, savings, personA, personB };
}

// ── Date utilities ────────────────────────────────────────────────────────────
function formatDateAU(d) {
  const dd = String(d.getDate()).padStart(2,"0");
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const yyyy = d.getFullYear();
  return dd + "/" + mm + "/" + yyyy;
}
function parseDateAU(str) {
  // Handles dd/mm/yyyy
  const parts = str.split("/");
  if (parts.length === 3) return new Date(+parts[2], +parts[1]-1, +parts[0]);
  return new Date(str);
}
function startOfDay(d) { const r=new Date(d); r.setHours(0,0,0,0); return r; }
function endOfDay(d)   { const r=new Date(d); r.setHours(23,59,59,999); return r; }
function addDays(d,n)  { const r=new Date(d); r.setDate(r.getDate()+n); return r; }

// Compute current fortnight window — uses API response directly (most reliable)
function getFnWindow() {
  const m    = data.meta;
  const freq = m.freq || 14;
  const now  = new Date();
  const MONTHS = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};

  // Parse "03 Apr" style dates from API meta
  function parseMetaDate(str) {
    try {
      const [dd, mo] = str.split(" ");
      // Try current year first, then next year if date is in the past
      let d = new Date(now.getFullYear(), MONTHS[mo], parseInt(dd));
      return d;
    } catch(e) { return new Date(); }
  }

  const s = startOfDay(parseMetaDate(m.fnStart));
  const e = endOfDay(parseMetaDate(m.fnEnd));

  // If fnEnd appears before fnStart (e.g. Dec→Jan year boundary), add a year to end
  if (e < s) e.setFullYear(e.getFullYear() + 1);

  const daysLeft    = Math.max(0, Math.ceil((e - now) / 86400000));
  const daysElapsed = Math.max(0, freq - daysLeft);
  return { start: s, end: e, daysLeft, daysElapsed, freq };
}

function filterTxn(el) {

function filterPeriod(el) {

  el.classList.add("active");

  if (txnPeriod === "custom") {

      document.getElementById("txn-range-to").value = today;
  } else {
    customRow.style.display = "none";
  }

function getTxnWindow() {
  const now = new Date();
  if (txnPeriod === "today") {
    return { start: startOfDay(now), end: endOfDay(now) };
  }
  if (txnPeriod === "yesterday") {
    const y = addDays(now, -1);
    return { start: startOfDay(y), end: endOfDay(y) };
  }
  if (txnPeriod === "week") {
    const dow = now.getDay(); // 0=Sun
    const toMon = dow === 0 ? 6 : dow - 1;
    const mon = addDays(now, -toMon);
    return { start: startOfDay(mon), end: endOfDay(addDays(mon, 6)) };
  }
  if (txnPeriod === "lastweek") {
    const dow = now.getDay();
    const toMon = dow === 0 ? 6 : dow - 1;
    const thisMon = addDays(now, -toMon);
    const lastMon = addDays(thisMon, -7);
    return { start: startOfDay(lastMon), end: endOfDay(addDays(lastMon, 6)) };
  }
  if (txnPeriod === "month") {
    return { start: new Date(now.getFullYear(), now.getMonth(), 1),
             end: endOfDay(now) };
  }
  if (txnPeriod === "lastmonth") {
    const y = now.getMonth() === 0 ? now.getFullYear()-1 : now.getFullYear();
    const m = now.getMonth() === 0 ? 11 : now.getMonth()-1;
    return { start: new Date(y, m, 1),
             end: new Date(y, m+1, 0, 23, 59, 59, 999) };
  }
  if (txnPeriod === "custom") {
    const f = document.getElementById("txn-range-from").value;
    const t = document.getElementById("txn-range-to").value;
    if (!f || !t) return null;
    return { start: startOfDay(new Date(f)), end: endOfDay(new Date(t)) };
  }
  // Default: current fortnight
  const fn = getFnWindow();
  return { start: fn.start, end: fn.end };
}

      </div>`;
    });
    html += `</div>`;
  });

  document.getElementById("txn-content").innerHTML = html;
}
</script>
